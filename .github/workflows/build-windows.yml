name: Build Windows Installer

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout v0.3.0 (same as current dmg release)
        uses: actions/checkout@v4
        with:
          ref: v0.3.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Windows NSIS installer (.exe)
        run: npm run tauri:build -- --bundles nsis

      - name: List bundle output
        run: Get-ChildItem -Recurse src-tauri\target\release\bundle\nsis\

      - name: Upload installer to GitHub Release v0.3.0
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $exe = Get-ChildItem -Path "src-tauri\target\release\bundle\nsis\*.exe" | Select-Object -First 1
          if (-not $exe) { throw "NSIS installer not found" }
          Write-Host "Uploading $($exe.Name) ($([math]::Round($exe.Length/1MB, 2)) MB)"
          gh release upload v0.3.0 $exe.FullName --clobber
